<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Graphify Viewer</title>
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff; height: 100%; font-family: system-ui, sans-serif; }
    #net { width: 100%; height: 100vh; }
    #hud { position: absolute; top: 8px; left: 8px; background: #141414; padding: 8px 12px; border: 1px solid #333; font-size: 12px; }
  </style>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <div id="hud">Graphify — drop a graph.json or call window.loadGraph(json)</div>
  <div id="net"></div>
  <script>
    let network = null;
    window.loadGraph = function (graphJson) {
      try {
        const g = typeof graphJson === 'string' ? JSON.parse(graphJson) : graphJson;
        const nodes = new vis.DataSet((g.nodes || []).map(n => ({
          id: n.id, label: n.label || n.name || String(n.id),
          color: { background: '#141414', border: '#E10600', highlight: { background: '#2a0606', border: '#FF3B30' } },
          font: { color: '#fff' }
        })));
        const edges = new vis.DataSet((g.edges || g.links || []).map((e, i) => ({
          id: i, from: e.source || e.from, to: e.target || e.to,
          color: { color: '#404040', highlight: '#FF3B30' }, arrows: 'to'
        })));
        network = new vis.Network(document.getElementById('net'), { nodes, edges }, {
          physics: { stabilization: { iterations: 200 } },
          nodes: { shape: 'dot', size: 10 }
        });
        document.getElementById('hud').textContent = `${nodes.length} nodes, ${edges.length} edges`;
      } catch (e) {
        document.getElementById('hud').textContent = 'Load error: ' + e.message;
      }
    };
    window.highlightNodes = function (ids) {
      if (!network || !ids || !ids.length) return;
      network.selectNodes(ids);
    };
  </script>
</body>
</html>
